; SimulatingShoe — Trade Show Firmware
; Board: ESP32-S2-Saola-1
; WiFi: fablab / fablabfdm (hardcoded, no WiFiManager)
; No InfluxDB — all data served via local web dashboard

[env:featheresp32-s2]
platform = espressif32
board = esp32-s2-saola-1
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
board_build.partitions = partitions.csv
upload_protocol = espota
upload_port = 10.124.11.50
